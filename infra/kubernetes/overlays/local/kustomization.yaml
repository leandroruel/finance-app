apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: finance-local

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: finance-api
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: finance-api-hpa
